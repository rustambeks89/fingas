<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Luxurious Dark Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161920"/>
      <stop offset="50%" stop-color="#0E1116"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    
    <!-- Neon Crimson-Rose Droplet Gradient -->
    <linearGradient id="dropletGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5D7B"/>
      <stop offset="45%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#880825"/>
    </linearGradient>

    <!-- Metallic Silver-Platinum F Gradient -->
    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#EBEFF5"/>
      <stop offset="100%" stop-color="#B0B6C4"/>
    </linearGradient>

    <!-- Soft Ambient Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#E11D48" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Premium Squircle Background -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Subtle glowing border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="15.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Fuel Droplet with ambient glow -->
  <g filter="url(#neonGlow)">
    <path d="M32 10 C38 19, 44 26, 44 32 C44 38.6, 38.6 44, 32 44 C25.4 44, 20 38.6, 20 32 C20 26, 26 19, 32 10 Z" fill="url(#dropletGrad)"/>
  </g>

  <!-- Signature bold geometric "F" overlay in silver-platinum -->
  <path d="M25.6 20.0
           h14.4
           a1.8 1.8 0 0 1 0 3.6
           H29.2
           v6.0
           h9.0
           a1.8 1.8 0 0 1 0 3.6
           H29.2
           v8.4
           a1.8 1.8 0 0 1-3.6 0
           V21.8
           a1.8 1.8 0 0 1 0-1.8z"
        fill="url(#silverGrad)"/>

  <!-- Elegant text brand typography at the bottom -->
  <text x="32" y="55" font-family="'Trebuchet MS', 'Outfit', sans-serif" font-weight="900" font-size="9px" letter-spacing="0.5px" text-anchor="middle">
    <tspan fill="url(#silverGrad)">fin</tspan><tspan fill="#FF5A79">gas</tspan>
  </text>
</svg>
